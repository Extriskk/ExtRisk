services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ext_intel
      POSTGRES_USER: ext_intel
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ext_intel"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://ext_intel:${DB_PASSWORD:-changeme}@db:5432/ext_intel
      REDIS_URL: redis://redis:6379/0
      API_KEYS: ${API_KEYS:-}
      VT_API_KEY: ${VT_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./reports:/app/reports
      - ./src:/app/src
      - ./api:/app/api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: python -m api.worker
    environment:
      DATABASE_URL: postgresql://ext_intel:${DB_PASSWORD:-changeme}@db:5432/ext_intel
      REDIS_URL: redis://redis:6379/0
      VT_API_KEY: ${VT_API_KEY:-}
    volumes:
      - ./reports:/app/reports
      - ./src:/app/src
      - ./api:/app/api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2

volumes:
  pgdata:
