# Chaintrap supply-chain scan for Extriskk/ExtRisk → org-acme dashboard.
# Secrets: CHAINTRAP_API_KEY (+ optional CHAINTRAP_SUPABASE_URL, CHAINTRAP_IOC_READ_KEY)
# Variables: CHAINTRAP_ORG_ID (org-acme), CHAINTRAP_API_URL (https://scan.chaintrap.com)

name: Chaintrap SCA

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  chaintrap-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Chaintrap supply chain scan
        id: chaintrap
        continue-on-error: true
        uses: chaintrap-sec/scan-action@main
        with:
          supabase-url: ${{ secrets.CHAINTRAP_SUPABASE_URL }}
          supabase-ioc-key: ${{ secrets.CHAINTRAP_IOC_READ_KEY }}
          org-id: ${{ vars.CHAINTRAP_ORG_ID || 'org-acme' }}
          api-url: ${{ vars.CHAINTRAP_API_URL || 'https://scan.chaintrap.com' }}
          api-key: ${{ secrets.CHAINTRAP_API_KEY }}
          fail-on-ioc: block
          fail-on-mal: "true"
          fail-on-cve: none
          ecosystems: npm,pypi
          max-packages: "200"

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: ${{ steps.chaintrap.outputs.sarif-file }}
          category: chaintrap

      - name: Comment PR summary
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        env:
          SUMMARY_FILE: ${{ steps.chaintrap.outputs.summary-file }}
        with:
          script: |
            const fs = require('fs');
            const path = process.env.SUMMARY_FILE;
            if (!path || !fs.existsSync(path)) {
              core.info('No summary file to post');
              return;
            }
            const body = fs.readFileSync(path, 'utf8');
            const marker = '<!-- chaintrap-sca -->';
            const fullBody = marker + '\n' + body;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }

      - name: Fail if scan blocked
        if: steps.chaintrap.outputs.exit-code == '2'
        run: |
          echo "Chaintrap scan blocked the workflow (exit 2)."
          exit 2
